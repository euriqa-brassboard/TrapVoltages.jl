name: CI
on:
  pull_request:
  push:
    branches:
      - master
    tags: '*'
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - 'min'
          - 'nightly'
        os:
          - ubuntu-latest
          - windows-latest
        arch:
          - x64
        nproc:
          - 1
        exclude:
          - version: "nightly"
            os: windows-latest
            arch: x64
            nproc: 1
        include:
          - version: "1"
            os: macOS-latest
            arch: aarch64
            nproc: 0
    steps:
      - uses: actions/checkout@v7
      - name: Disable multiprocess
        if: ${{ matrix.nproc == 0 }}
        run: echo "TRAP_VOLTAGES_NPROC=0" >> $GITHUB_ENV
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v7
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
